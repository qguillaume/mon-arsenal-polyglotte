<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arsenal Polyglotte | Guillaume Q.</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Arsenal Polyglotte</h1>
      <p class="subtitle">
        Stratégie d'apprentissage accéléré par Guillaume Q.
      </p>
    </header>

    <div class="config-container">
      <div class="config-row">
        <strong>Langue Source :</strong>
        <label
          ><input
            type="radio"
            name="source"
            value="fr"
            checked
            onchange="syncLangs()"
          />
          FR</label
        >
        <label
          ><input
            type="radio"
            name="source"
            value="de"
            onchange="syncLangs()"
          />
          DE</label
        >
        <label
          ><input
            type="radio"
            name="source"
            value="en"
            onchange="syncLangs()"
          />
          EN</label
        >
        <label
          ><input
            type="radio"
            name="source"
            value="es"
            onchange="syncLangs()"
          />
          ES</label
        >
      </div>
      <div class="config-row">
        <strong>Cibles :</strong>
        <label
          ><input type="checkbox" id="target-fr" class="target-check" />
          FR</label
        >
        <label
          ><input type="checkbox" id="target-de" class="target-check" checked />
          DE</label
        >
        <label
          ><input type="checkbox" id="target-en" class="target-check" checked />
          EN</label
        >
        <label
          ><input type="checkbox" id="target-es" class="target-check" checked />
          ES</label
        >
      </div>
      <div class="config-row">
        <strong>Type :</strong>
        <select id="typeFilter" onchange="nextWord()">
          <option value="all">TOUS</option>
          <option value="verbe">VERBES</option>
          <option value="nom">NOMS / OBJETS</option>
          <option value="adj">QUALIFICATIFS (ADJ)</option>
        </select>
      </div>
    </div>

    <div class="search-container">
      <input
        type="text"
        id="searchInput"
        placeholder="Rechercher un mot..."
        onkeyup="searchWord()"
      />
    </div>

    <div class="card" id="mainCard">
      <div id="langLabel" class="label">Chargement...</div>
      <div id="wordDisplay" class="word">Initialisation...</div>
      <button class="speaker-btn" onclick="speakWord(event)">🔊</button>
      <div id="subDisplay" class="sub-word"></div>
    </div>

    <div class="controls">
      <button class="btn" onclick="nextWord()">NOUVELLE MISSION</button>
    </div>

    <footer>
      Système JarvisOrion v4.0 | Déploiement Vercel | Guillaume Q.
    </footer>

    <script src="app.js"></script>
  </body>
</html>
