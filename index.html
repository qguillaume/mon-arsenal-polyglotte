<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arsenal Polyglotte - JarvisOrion</title>
    <style>
      body {
        background-color: #0f172a;
        color: #f8fafc;
        font-family: "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      .config-container {
        background: #1e293b;
        padding: 1.5rem;
        border-radius: 1rem;
        margin-bottom: 2rem;
        border: 1px solid #334155;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .config-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .config-row strong {
        width: 140px;
        color: #38bdf8;
      }
      .card {
        background: #1e293b;
        padding: 2.5rem;
        border-radius: 1.5rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        text-align: center;
        width: 380px;
        min-height: 250px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border: 3px solid #38bdf8;
        cursor: pointer;
        transition: 0.3s;
      }
      .card:hover {
        transform: translateY(-5px);
        border-color: #7dd3fc;
      }
      .label {
        color: #7dd3fc;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 1.5rem;
      }
      .word {
        font-size: 2.5rem;
        font-weight: 800;
        margin-bottom: 1rem;
      }
      .sub-word {
        font-size: 1.5rem;
        color: #94a3b8;
        min-height: 1.6rem;
      }
      .btn {
        margin-top: 2rem;
        background: #38bdf8;
        color: #0f172a;
        border: none;
        padding: 1rem 2rem;
        border-radius: 0.75rem;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="config-container">
      <div class="config-row">
        <strong>Langue Source :</strong>
        <label
          ><input
            type="radio"
            name="source"
            value="fr"
            checked
            onchange="syncLangs()"
          />
          FR</label
        >
        <label
          ><input
            type="radio"
            name="source"
            value="de"
            onchange="syncLangs()"
          />
          DE</label
        >
        <label
          ><input
            type="radio"
            name="source"
            value="en"
            onchange="syncLangs()"
          />
          EN</label
        >
        <label
          ><input
            type="radio"
            name="source"
            value="es"
            onchange="syncLangs()"
          />
          ES</label
        >
      </div>
      <div class="config-row">
        <strong>Traductions :</strong>
        <label
          ><input type="checkbox" id="target-fr" class="target-check" />
          FR</label
        >
        <label
          ><input type="checkbox" id="target-de" class="target-check" checked />
          DE</label
        >
        <label
          ><input type="checkbox" id="target-en" class="target-check" checked />
          EN</label
        >
        <label
          ><input type="checkbox" id="target-es" class="target-check" checked />
          ES</label
        >
      </div>
    </div>

    <div class="card" id="mainCard">
      <div id="langLabel" class="label">Chargement...</div>
      <div id="wordDisplay" class="word">Appuyez sur Suivant</div>
      <div id="subDisplay" class="sub-word"></div>
    </div>

    <button class="btn" onclick="nextWord()">NOUVEAU DÉFI</button>

    <script>
      const vocabulaire = [
        {
          de: "Überall",
          fr: "Partout",
          en: "Everywhere",
          es: "En todas partes",
        },
        { de: "Bauen", fr: "Bâtir", en: "To build", es: "Construir" },
        { de: "Erfolg", fr: "Succès", en: "Success", es: "Éxito" },
        { de: "Entscheidung", fr: "Décision", en: "Decision", es: "Decisión" },
      ];

      let currentIndex = 0;
      let currentStep = -1; // -1 pour la langue source
      const langNames = {
        fr: "Français",
        de: "Allemand",
        en: "Anglais",
        es: "Espagnol",
      };

      function syncLangs() {
        const source = document.querySelector(
          'input[name="source"]:checked',
        ).value;
        const checks = document.querySelectorAll(".target-check");

        checks.forEach((check) => {
          const langId = check.id.split("-")[1];
          if (langId === source) {
            check.checked = false;
            check.disabled = true;
          } else {
            check.disabled = false;
          }
        });
        nextWord();
      }

      function getActiveTargets() {
        const targets = [];
        document.querySelectorAll(".target-check:checked").forEach((check) => {
          const id = check.id.split("-")[1];
          targets.push({ id: id, label: langNames[id] });
        });
        return targets;
      }

      function updateCard() {
        const sourceLang = document.querySelector(
          'input[name="source"]:checked',
        ).value;
        const item = vocabulaire[currentIndex];
        const targets = getActiveTargets();

        if (currentStep === -1) {
          document.getElementById("langLabel").innerText =
            langNames[sourceLang];
          document.getElementById("wordDisplay").innerText = item[sourceLang];
          document.getElementById("subDisplay").innerText = "";
        } else if (targets.length > 0) {
          const target = targets[currentStep];
          document.getElementById("langLabel").innerText = target.label;
          document.getElementById("subDisplay").innerText = item[target.id];
        }
      }

      document.getElementById("mainCard").onclick = () => {
        const targets = getActiveTargets();
        if (currentStep < targets.length - 1) {
          currentStep++;
        } else {
          currentStep = -1;
        }
        updateCard();
      };

      function nextWord() {
        currentIndex = Math.floor(Math.random() * vocabulaire.length);
        currentStep = -1;
        updateCard();
      }

      syncLangs();
    </script>
  </body>
</html>
